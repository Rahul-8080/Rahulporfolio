<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz System</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 10px;
      color: #e94560;
    }

    #quiz-box {
      background: #16213e;
      border-radius: 12px;
      padding: 30px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    #question-counter {
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 8px;
    }

    #question {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .option {
      background: #0f3460;
      border: 2px solid transparent;
      border-radius: 8px;
      padding: 12px 18px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 1rem;
    }

    .option:hover { border-color: #e94560; background: #1a4a80; }
    .option.correct { background: #1b5e20; border-color: #4caf50; }
    .option.wrong   { background: #b71c1c; border-color: #ef5350; }
    .option.disabled { pointer-events: none; }

    #next-btn {
      margin-top: 20px;
      padding: 12px 32px;
      background: #e94560;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 1rem;
      cursor: pointer;
      display: none;
    }

    #next-btn:hover { background: #c73652; }

    #progress-bar {
      width: 100%;
      height: 6px;
      background: #0f3460;
      border-radius: 3px;
      margin-bottom: 20px;
    }

    #progress-fill {
      height: 100%;
      background: #e94560;
      border-radius: 3px;
      transition: width 0.3s;
    }

    #result-box {
      text-align: center;
      display: none;
    }

    #result-box h2 { font-size: 1.8rem; margin-bottom: 10px; }
    #score-text { font-size: 1.1rem; color: #aaa; margin-bottom: 24px; }

    #restart-btn {
      padding: 12px 32px;
      background: #e94560;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 1rem;
      cursor: pointer;
    }

    #restart-btn:hover { background: #c73652; }
  </style>
</head>
<body>

  <h1>Quiz System</h1>

  <div id="quiz-box">
    <div id="progress-bar"><div id="progress-fill"></div></div>
    <div id="question-counter"></div>
    <div id="question"></div>
    <div id="options"></div>
    <button id="next-btn">Next &rarr;</button>

    <div id="result-box">
      <h2>Quiz Complete!</h2>
      <p id="score-text"></p>
      <button id="restart-btn">Restart Quiz</button>
    </div>
  </div>

  <script>
    const questions = [
      {
        q: "Which planet has the most moons?",
        options: ["Jupiter", "Saturn", "Uranus", "Neptune"],
        answer: 1
      },
      {
        q: "What does HTML stand for?",
        options: ["HyperText Markup Language", "High Transfer Markup Language", "HyperText Media Language", "HyperTransfer Markup Logic"],
        answer: 0
      },
      {
        q: "Which language is primarily used for styling web pages?",
        options: ["JavaScript", "Python", "CSS", "Java"],
        answer: 2
      },
      {
        q: "What is the output of 2 ** 10 in Python?",
        options: ["20", "512", "1024", "2048"],
        answer: 2
      },
      {
        q: "Which data structure works on LIFO principle?",
        options: ["Queue", "Stack", "Array", "Linked List"],
        answer: 1
      },
      {
        q: "What does API stand for?",
        options: ["Application Programming Interface", "Automated Program Interaction", "Applied Protocol Integration", "Application Process Index"],
        answer: 0
      },
      {
        q: "Which company developed React?",
        options: ["Google", "Twitter", "Facebook", "Microsoft"],
        answer: 2
      },
      {
        q: "What is the time complexity of binary search?",
        options: ["O(n)", "O(n²)", "O(log n)", "O(1)"],
        answer: 2
      }
    ];

    let current = 0, score = 0;

    const questionEl   = document.getElementById('question');
    const optionsEl    = document.getElementById('options');
    const nextBtn      = document.getElementById('next-btn');
    const counterEl    = document.getElementById('question-counter');
    const progressFill = document.getElementById('progress-fill');
    const resultBox    = document.getElementById('result-box');
    const scoreText    = document.getElementById('score-text');
    const restartBtn   = document.getElementById('restart-btn');

    function loadQuestion() {
      const q = questions[current];
      counterEl.textContent = `Question ${current + 1} of ${questions.length}`;
      progressFill.style.width = `${(current / questions.length) * 100}%`;
      questionEl.textContent = q.q;
      optionsEl.innerHTML = '';
      nextBtn.style.display = 'none';

      q.options.forEach((opt, i) => {
        const btn = document.createElement('div');
        btn.className = 'option';
        btn.textContent = opt;
        btn.addEventListener('click', () => selectAnswer(i, btn));
        optionsEl.appendChild(btn);
      });
    }

    function selectAnswer(index, btn) {
      const correct = questions[current].answer;
      document.querySelectorAll('.option').forEach(o => o.classList.add('disabled'));

      if (index === correct) {
        btn.classList.add('correct');
        score++;
      } else {
        btn.classList.add('wrong');
        document.querySelectorAll('.option')[correct].classList.add('correct');
      }

      nextBtn.style.display = 'block';
    }

    nextBtn.addEventListener('click', () => {
      current++;
      if (current < questions.length) {
        loadQuestion();
      } else {
        showResult();
      }
    });

    function showResult() {
      questionEl.textContent = '';
      optionsEl.innerHTML = '';
      counterEl.textContent = '';
      nextBtn.style.display = 'none';
      progressFill.style.width = '100%';
      resultBox.style.display = 'block';
      const pct = Math.round((score / questions.length) * 100);
      scoreText.textContent = `You scored ${score} out of ${questions.length} (${pct}%)`;
    }

    restartBtn.addEventListener('click', () => {
      current = 0; score = 0;
      resultBox.style.display = 'none';
      loadQuestion();
    });

    loadQuestion();
  </script>
</body>
</html>
