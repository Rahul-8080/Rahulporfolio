<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Doctor Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .container { justify-content: center; align-items: center; }

        form {
            max-width: 600px;
            width: 100%;
            padding: 2rem;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        label { display: block; margin-bottom: 0.5rem; }

        input, select {
            width: 100%;
            padding: 0.5rem;
            margin-bottom: 1rem;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            width: 70%;
            background-color: #4caf50;
            color: white;
            padding: 0.7rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover { background-color: #45a049; }

        #addImage { text-align: center; margin-bottom: 30px; }

        #customImage {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
        }

        .back-link { text-align: center; margin-top: 12px; font-size: 0.9rem; }
        .back-link a { color: #4caf50; text-decoration: none; }
    </style>
</head>
<body>
    <form id="MainForm">
        <div class="container">
            <div id="addImage">
                <img src="https://cdn-icons-png.flaticon.com/512/3774/3774299.png" class="img-fluid" id="customImage" width="120">
            </div>
            <h4 class="text-center mb-3">Doctor Login</h4>
            <div class="form-outline mb-4">
                <label>Email address:</label>
                <input type="email" class="form-control" id="emailInp" placeholder="name@example.com">
            </div>
            <div class="form-outline mb-4">
                <label>Password:</label>
                <input type="password" class="form-control" id="passwordInp" placeholder="Password">
            </div>
            <div class="row mb-4">
                <div class="col d-flex justify-content-center">
                    <button type="submit">Login</button>
                </div>
            </div>
            <div class="back-link">
                <a href="index.html">← Back to Home</a>
            </div>
        </div>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
        crossorigin="anonymous"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB0YPYdR4XzuTvaETPtPIt9NM_JWSyy90c",
            authDomain: "backend-b1818.firebaseapp.com",
            databaseURL: "https://backend-b1818-default-rtdb.firebaseio.com",
            projectId: "backend-b1818",
            storageBucket: "backend-b1818.appspot.com",
            messagingSenderId: "431165968027",
            appId: "1:431165968027:web:63bf01d1c168377db7803e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const EmailInp = document.getElementById('emailInp');
        const PassInp = document.getElementById('passwordInp');
        const MainForm = document.getElementById('MainForm');

        MainForm.addEventListener('submit', function(evt) {
            evt.preventDefault();
            signInWithEmailAndPassword(auth, EmailInp.value, PassInp.value)
                .then((credentials) => {
                    localStorage.setItem('userEmail', EmailInp.value);
                    window.location.href = 'doctor.html';
                })
                .catch((error) => {
                    alert(error.message);
                });
        });
    </script>
</body>
</html>
