<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointment Booking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; }

        h1 {
            background-color: #252525;
            padding: 10px;
            margin: 0;
            color: #ffffff;
            text-align: center;
        }

        .container {
            justify-content: center;
            max-width: 400px;
            flex-direction: column;
            margin-top: 20px;
        }

        label { display: block; margin-bottom: 0.5rem; }

        input, select {
            width: 100%;
            padding: 0.5rem;
            margin-bottom: 1rem;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            background-color: #4caf50;
            color: white;
            padding: 0.7rem 2rem;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            display: block;
            margin: 0 auto;
        }

        button:hover { background-color: #45a049; }

        .back-link { text-align: center; margin-top: 16px; }
        .back-link a { color: #4caf50; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>
    <h1>Appointment Booking</h1>
    <div class="container">
        <br>
        <label>Name:</label><input id="nameInp" type="text" required>
        <label>Phone no:</label><input id="phoneInp" type="text" required>
        <label>Select Doctor:</label>
        <select id="doctorEmail" required>
            <option value="akash@gmail.com">Dr. Akash Roy</option>
            <option value="jane@gmail.com">Dr. Jane Barnes</option>
            <option value="michael@gmail.com">Dr. Michael Scott</option>
            <option value="shruti@gmail.com">Dr. Shruti Sharma</option>
            <option value="robert@gmail.com">Dr. Robert Green</option>
        </select>
        <label>Select Time:</label>
        <select id="timeInp" required>
            <option value="08:00-10:00">08:00 - 10:00</option>
            <option value="10:00-12:00">10:00 - 12:00</option>
            <option value="12:00-13:00">12:00 - 13:00</option>
            <option value="14:00-16:00">14:00 - 16:00</option>
            <option value="16:00-18:00">16:00 - 18:00</option>
        </select>
        <button id="InsBtn">BOOK APPOINTMENT</button>
        <div class="back-link"><a href="patient2.html">← Back to Doctors</a></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        const firebaseConfig = {
            apiKey: "AIzaSyBBwj-XFHbxIkfYyVJaXCSqf118A_LYVg8",
            authDomain: "doctorreg-2fc4a.firebaseapp.com",
            databaseURL: "https://doctorreg-2fc4a-default-rtdb.firebaseio.com",
            projectId: "doctorreg-2fc4a",
            storageBucket: "doctorreg-2fc4a.appspot.com",
            messagingSenderId: "686704002624",
            appId: "1:686704002624:web:53dd70a58e0159c4ea41a5"
        };

        const app = initializeApp(firebaseConfig);
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        const db = getFirestore();

        const nameInp    = document.getElementById('nameInp');
        const phoneInp   = document.getElementById('phoneInp');
        const doctorEmail = document.getElementById('doctorEmail');
        const timeInp    = document.getElementById('timeInp');

        function getRandomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1) + min);
        }

        async function generateUniquePatientId() {
            let patientId;
            let isUnique = false;
            while (!isUnique) {
                patientId = getRandomInt(100, 1000);
                const snap = await getDoc(doc(db, "PatientSet", patientId.toString()));
                if (!snap.exists()) isUnique = true;
            }
            return patientId;
        }

        document.getElementById('InsBtn').addEventListener('click', async () => {
            if (!nameInp.value || !phoneInp.value) {
                alert('Please fill in all fields.');
                return;
            }
            const patientId = await generateUniquePatientId();
            await setDoc(doc(db, "PatientSet", patientId.toString()), {
                patientId,
                name: nameInp.value,
                phone: phoneInp.value,
                doctorEmail: doctorEmail.value,
                time: timeInp.value,
            })
            .then(() => {
                alert("Appointment booked successfully!");
                window.location.href = 'patient2.html';
            })
            .catch(() => { alert("Error booking appointment. Please try again."); });
        });
    </script>
</body>
</html>
