<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfer Patient</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; }

        h1 {
            background-color: #252525;
            padding: 10px;
            margin: 0;
            color: #ffffff;
            text-align: center;
            position: relative;
        }

        .close-btn {
            position: absolute;
            top: 12px;
            right: 20px;
            cursor: pointer;
            font-size: 22px;
            color: #fff;
        }

        .container { justify-content: center; max-width: 400px; flex-direction: column; margin-top: 20px; }

        label { display: block; margin-bottom: 0.5rem; }

        input, select {
            width: 100%;
            padding: 0.5rem;
            margin-bottom: 1rem;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .button-row { display: flex; justify-content: space-around; gap: 8px; }

        .btn-action {
            background-color: #252525;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            flex: 1;
        }

        .btn-action:hover { opacity: 0.85; }
    </style>
</head>
<body>
    <h1>Transfer Patient <span class="close-btn" onclick="window.history.back()">&#10006;</span></h1>
    <div class="container">
        <br>
        <label>Name:</label><input id="nameInp" type="text" required>
        <label>Patient ID:</label><input id="patientId" type="text" required>
        <label>Select Doctor:</label>
        <select id="doctorEmail" required>
            <option value="akash@gmail.com">Dr. Akash Roy</option>
            <option value="jane@gmail.com">Dr. Jane Barnes</option>
            <option value="michael@gmail.com">Dr. Michael Scott</option>
            <option value="shruti@gmail.com">Dr. Shruti Sharma</option>
            <option value="robert@gmail.com">Dr. Robert Green</option>
        </select>
        <label>Select Time:</label>
        <select id="timeInp" required>
            <option value="08:00-10:00">08:00 - 10:00</option>
            <option value="10:00-12:00">10:00 - 12:00</option>
            <option value="12:00-13:00">12:00 - 13:00</option>
            <option value="14:00-16:00">14:00 - 16:00</option>
            <option value="16:00-18:00">16:00 - 18:00</option>
        </select>
        <div class="button-row">
            <button class="btn-action" id="SelBtn">RETRIEVE</button>
            <button class="btn-action" id="UpdBtn">TRANSFER</button>
            <button class="btn-action" id="DelBtn">CANCEL</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        const firebaseConfig = {
            apiKey: "AIzaSyBBwj-XFHbxIkfYyVJaXCSqf118A_LYVg8",
            authDomain: "doctorreg-2fc4a.firebaseapp.com",
            databaseURL: "https://doctorreg-2fc4a-default-rtdb.firebaseio.com",
            projectId: "doctorreg-2fc4a",
            storageBucket: "doctorreg-2fc4a.appspot.com",
            messagingSenderId: "686704002624",
            appId: "1:686704002624:web:53dd70a58e0159c4ea41a5"
        };

        const app = initializeApp(firebaseConfig);
        import { getFirestore, doc, setDoc, deleteDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        const db = getFirestore();

        const nameInp     = document.getElementById('nameInp');
        const patientId   = document.getElementById('patientId');
        const doctorEmail = document.getElementById('doctorEmail');
        const timeInp     = document.getElementById('timeInp');

        document.getElementById('SelBtn').addEventListener('click', async () => {
            const snap = await getDoc(doc(db, "PatientSet", patientId.value));
            if (snap.exists()) {
                nameInp.value     = snap.data().name;
                doctorEmail.value = snap.data().doctorEmail;
                timeInp.value     = snap.data().time;
            } else {
                alert("No such patient found.");
            }
        });

        document.getElementById('UpdBtn').addEventListener('click', async () => {
            await updateDoc(doc(db, "PatientSet", patientId.value), {
                name: nameInp.value, doctorEmail: doctorEmail.value, time: timeInp.value
            })
            .then(() => alert("Patient transferred successfully."))
            .catch(() => alert("Error transferring patient."));
        });

        document.getElementById('DelBtn').addEventListener('click', async () => {
            await deleteDoc(doc(db, "PatientSet", patientId.value))
            .then(() => alert("Appointment cancelled."))
            .catch(() => alert("Error cancelling appointment."));
        });
    </script>
</body>
</html>
