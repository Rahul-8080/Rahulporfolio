<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doctor App – Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    .logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo .icon {
      font-size: 3rem;
      display: block;
      margin-bottom: 8px;
    }

    .logo h1 {
      font-size: 1.6rem;
      color: #1a73e8;
      font-weight: 700;
    }

    .logo p {
      font-size: 0.85rem;
      color: #888;
      margin-top: 4px;
    }

    .tabs {
      display: flex;
      background: #f1f3f4;
      border-radius: 8px;
      margin-bottom: 28px;
      padding: 4px;
    }

    .tab {
      flex: 1;
      text-align: center;
      padding: 9px;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      color: #555;
      transition: all 0.2s;
    }

    .tab.active {
      background: #1a73e8;
      color: #fff;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: #444;
      margin-bottom: 6px;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      color: #333;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #1a73e8; }

    .role-select {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .role-btn {
      flex: 1;
      padding: 10px;
      border: 2px solid #ddd;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      text-align: center;
      font-size: 0.85rem;
      color: #555;
      transition: all 0.2s;
    }

    .role-btn.selected {
      border-color: #1a73e8;
      background: #e8f0fe;
      color: #1a73e8;
      font-weight: 700;
    }

    .role-btn span { display: block; font-size: 1.4rem; margin-bottom: 4px; }

    .submit-btn {
      width: 100%;
      padding: 13px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 4px;
    }

    .submit-btn:hover { background: #1558b0; }

    .error {
      color: #d93025;
      font-size: 0.82rem;
      margin-top: -10px;
      margin-bottom: 12px;
      display: none;
    }

    .divider {
      text-align: center;
      color: #aaa;
      font-size: 0.82rem;
      margin: 16px 0;
      position: relative;
    }

    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 42%;
      height: 1px;
      background: #e0e0e0;
    }
    .divider::before { left: 0; }
    .divider::after  { right: 0; }

    .demo-hint {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 0.8rem;
      color: #555;
      text-align: center;
      margin-top: 20px;
      border: 1px solid #e0e0e0;
    }

    .demo-hint strong { color: #1a73e8; }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <span class="icon">🏥</span>
    <h1>MediConnect</h1>
    <p>Doctor–Patient Appointment System</p>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('login')">Login</div>
    <div class="tab" onclick="switchTab('register')">Register</div>
  </div>

  <!-- LOGIN FORM -->
  <div id="login-form">
    <div style="margin-bottom:16px;">
      <p style="font-size:0.85rem;color:#555;margin-bottom:8px;font-weight:600;">Login as</p>
      <div class="role-select">
        <div class="role-btn selected" id="role-patient" onclick="selectRole('patient')">
          <span>🧑‍⚕️</span>Patient
        </div>
        <div class="role-btn" id="role-doctor" onclick="selectRole('doctor')">
          <span>👨‍⚕️</span>Doctor
        </div>
      </div>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="you@example.com">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••">
    </div>

    <p class="error" id="login-error">Invalid email or password. Try demo credentials below.</p>

    <button class="submit-btn" onclick="handleLogin()">Login</button>

    <div class="demo-hint">
      <strong>Demo credentials</strong><br>
      Patient: patient@demo.com / patient123<br>
      Doctor: doctor@demo.com / doctor123
    </div>
  </div>

  <!-- REGISTER FORM -->
  <div id="register-form" style="display:none;">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="reg-name" placeholder="John Doe">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="reg-email" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label>Phone</label>
      <input type="tel" id="reg-phone" placeholder="+91 XXXXX XXXXX">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="reg-password" placeholder="Min. 6 characters">
    </div>
    <p class="error" id="reg-error">Please fill all fields correctly.</p>
    <button class="submit-btn" onclick="handleRegister()">Create Account</button>
  </div>
</div>

<script>
  let selectedRole = 'patient';

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
    });
    document.getElementById('login-form').style.display    = tab === 'login'    ? 'block' : 'none';
    document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
  }

  function selectRole(role) {
    selectedRole = role;
    document.getElementById('role-patient').classList.toggle('selected', role === 'patient');
    document.getElementById('role-doctor').classList.toggle('selected', role === 'doctor');
  }

  function handleLogin() {
    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value.trim();
    const errEl    = document.getElementById('login-error');

    const valid =
      (email === 'patient@demo.com' && password === 'patient123') ||
      (email === 'doctor@demo.com'  && password === 'doctor123');

    if (valid) {
      errEl.style.display = 'none';
      window.location.href = 'doctors-app.html';
    } else {
      errEl.style.display = 'block';
    }
  }

  function handleRegister() {
    const name     = document.getElementById('reg-name').value.trim();
    const email    = document.getElementById('reg-email').value.trim();
    const phone    = document.getElementById('reg-phone').value.trim();
    const password = document.getElementById('reg-password').value.trim();
    const errEl    = document.getElementById('reg-error');

    if (!name || !email || !phone || password.length < 6) {
      errEl.style.display = 'block';
      return;
    }

    errEl.style.display = 'none';
    alert(`Account created for ${name}! Please login.`);
    switchTab('login');
  }
</script>

</body>
</html>
